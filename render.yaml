# Render Blueprint — deploys the FastAPI backend as a web service.
# In Render: New > Blueprint, point it at this repo, and it reads this file.
services:
  - type: web
    name: lumino-backend
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    # Render injects $PORT; the app must bind it. cwd is `backend/`, so the
    # relative template path and the SQLite path in config.py both resolve.
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    autoDeploy: true
